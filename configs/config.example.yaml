# LuminaQuant example config profile.
# Copy to config.yaml and adjust values for your environment.

storage:
  backend: parquet
  market_data_parquet_path: data/market_parquet
  postgres_dsn_env: LQ_POSTGRES_DSN
  collector_bootstrap_lookback_hours: 24

runtime:
  mode: paper

symbols:
  - BTC/USDT
  - ETH/USDT
  - XPT/USDT
  - XPD/USDT

timeframe: 1m
