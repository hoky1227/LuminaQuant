  <text x="740" y="274" font-family="Arial, sans-serif" font-size="12">20,145 specs / 0 improved</text>
  <text x="210" y="326" font-family="Arial, sans-serif" font-size="11" fill="#555">Long bars: evaluated specs scaled within each section; dark bars: promotable successes/improvements.</text>
