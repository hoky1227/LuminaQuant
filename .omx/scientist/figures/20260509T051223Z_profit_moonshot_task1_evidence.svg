  <text x="270" y="168" font-family="Arial, sans-serif" font-size="12">640 specs / 0 success</text>
  <text x="30" y="222" font-family="Arial, sans-serif" font-size="13">H1/H2 portfolio follow-up</text>
  <rect x="210" y="204" width="520" height="22" fill="#fdbf6f"/>
