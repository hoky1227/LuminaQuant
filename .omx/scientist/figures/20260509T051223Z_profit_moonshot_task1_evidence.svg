  <text x="740" y="221" font-family="Arial, sans-serif" font-size="12">20,145 specs / 0 improved</text>
  <text x="30" y="275" font-family="Arial, sans-serif" font-size="13">H3/H4/H5 portfolio follow-up</text>
  <rect x="210" y="257" width="520" height="22" fill="#cab2d6"/>
