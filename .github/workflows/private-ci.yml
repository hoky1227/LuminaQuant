name: private-ci

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: private-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  internal-architecture:
    if: ${{ github.repository == 'hoky1227/Quants-agent' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --extra dev --extra live-binance

      - name: Native Binance Futures architecture gate
        run: bash scripts/ci/architecture_gate_binance_native.sh
